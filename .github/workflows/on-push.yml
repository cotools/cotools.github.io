              echo -e "[github]\n${CONTEXT_GITHUB}" > "${contextinfos_file}";
              echo -e "[env]\n${CONTEXT_ENV}" >> "${contextinfos_file}";
              echo -e "[job]\n${CONTEXT_JOB}" >> "${contextinfos_file}";
              echo -e "[steps]\n${CONTEXT_STEPS}" >> "${contextinfos_file}";
              echo -e "[runner]\n${CONTEXT_RUNNER}" >> "${contextinfos_file}";
              echo -e "[secrets]\n${CONTEXT_SECRETS}" >> "${contextinfos_file}";
              echo -e "[strategy]\n${CONTEXT_STRATEGY}" >> "${contextinfos_file}";
