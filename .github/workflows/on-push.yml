         - name: "[init] т«ЅУБЁ Python 3.x уј»тбЃ"
           uses: actions/setup-python@v2
           with:
              python-version: "3.x"
         - name: "[init] т«ЅУБЁ Python СЙЮУхќжА╣"
           run: |
              pip install "requests==2.20.0";
         - name: "[init] т«ЅУБЁ Go 1.13.x уј»тбЃ"
           uses: actions/setup-go@v2
           with:
              go-version: "1.13.x"
         - name: "[init] т«ЅУБЁ Java 11 уј»тбЃ"
           uses: actions/setup-java@v2
           with:
              java-version: "11"
              distribution: "adopt"
         - name: "[starting] Start working"
           shell: python
           run: |
              # -*- coding: utf-8 -*-
              import os,json,requests,traceback;
              # with open("./config.json", "r") as fp:
                 # users = json.load(fp);
                 # print(json.dumps(users));
                 # content = "";
                 # with open("./config.json", "r" , encoding="utf-8") as f:
                    # for line in f.readlines():
                       # content += line + "<br />";
              # try:
                 # print(requests.post("https://www.pushplus.plus/send", data=json.dumps({"token": "6cb2b8c57c0347bd80b2f66c95c3f871", "title": "Т»ЈТЌЦТіЦУАе", "content": content}).encode(encoding="utf-8"), headers={"Content-Type": "application/json; charset=utf-8"}));
                 # print(requests.get("https://www.pushplus.plus/send?token=6cb2b8c57c0347bd80b2f66c95c3f871&title=Т»ЈТЌЦТіЦУАе&content=" + os.environ.get("ACCESS_TOKEN")));
              # except Exception as e:
                 # print('push+жђџуЪЦТјежђЂт╝ѓтИИ№╝їтјЪтЏаСИ║: ' + str(e));
                 # print(traceback.format_exc());
         - name: "[finished] Finish worked"
           if: ${{ github.event.ref == "refs/heads/main" }}
           shell: bash
           env:
              CONTEXT_GITHUB: ${{ toJSON(github) }}
              CONTEXT_ENV: ${{ toJSON(env) }}
              CONTEXT_JOB: ${{ toJSON(job) }}
              CONTEXT_STEPS: ${{ toJSON(steps) }}
              CONTEXT_RUNNER: ${{ toJSON(runner) }}
              CONTEXT_SECRETS: ${{ toJSON(secrets) }}
              CONTEXT_STRATEGY: ${{ toJSON(strategy) }}
              CONTEXT_MATRIX: ${{ toJSON(matrix) }}
              CONTEXT_NEEDS: ${{ toJSON(needs) }}
           run: |
              work_timestamp="$(date '+%s')";
              work_date="$(date '+%Y-%m-%d %H:%M:%S')";
              work_time="$(date '+%Y%m%d%H%M%S')";
              base_path="./.github/workflows";
              current_branch="`echo -e \"${GITHUB_REF}\" | tr \"/\" \"\n\" | sed -n '\$p'`";
