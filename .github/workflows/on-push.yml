              echo -e "\t$(date '+[%Y-%m-%d %H:%M:%S]') ућЪТѕљТюђТќ░УхёТ║љтїЁ";
              # zip -q -r "${release_file}" * .[^.]*;
              (
                 cd "../" && zip -q -r "./${REPO_NAME}/${release_file}" "${REPO_NAME}";
              );
              
              git config --global user.name "lyk082401";
              git config --global user.email "lyk082401@qq.com";
              echo -e "\t$(date '+[%Y-%m-%d %H:%M:%S]') ућеТѕиС┐АТЂ»";
              git config --list;
              echo -e "\t$(date '+[%Y-%m-%d %H:%M:%S]') Тюгтю░уіХТђЂ";
              git status;
              echo -e "\t$(date '+[%Y-%m-%d %H:%M:%S]') У┐юуеІС┐АТЂ»";
              git remote -v;
